<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div>
        <!--Cadastro-->
        <section class="content-cadastro" id="content-cadastro">
            <h2>Cadastrar usuário</h2>
            <form id="form-cadastro">
                <label>Nome</label>
                <input type="text" id="input-name" required />
                <label>Email</label>
                <input type="email" id="input-email" required />
                <label>Senha</label>
                <input type="password" id="input-password" required />

                <button type="submit">Criar conta</button>
                <a href="#" id="link-login">Já tenho uma conta</a>
            </form>
        </section>



        <!--Login-->
        <section class="content-login" id="content-login">
            <div class="content-left">
                <div>Tasks</div>
                <p>Transforme suas metas em tarefas e suas tarefas em resultados. Entre e comece a produzir.</p>
                <img src=".\assets\Illustration.png" />
            </div>
            <div class="content-right">
                <form id="form-login">
                    <div class="text-logi">Log in</div>
                    <div class="input">
                        <label>Email</label>
                        <input type="email" id="login-input-email" required />
                    </div>

                    <div class="input">
                        <label>Senha</label>
                        <input type="password" id="login-input-password" required />
                    </div>
                    <div class="btn">
                        <button type="submit">Entrar</button>
                        <span class="btn-desc">Don’t have an ccount? <span id="link-criar-conta">Sign up</span></span>
                    </div>
                </form>
            </div>

        </section>
    </div>
    <script src="script.js"></script>
</body>

</html>
