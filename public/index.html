<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <h1>Bem-vindo</h1>

    <!--Cadastro-->
    <section class="content-cadastro" id="content-cadastro">
        <h2>Cadastrar usuário</h2>
        <form id="form-cadastro">
            <label>Nome</label>
            <input type="text" id="input-name" required />
            <label>Email</label>
            <input type="email" id="input-email" required />
            <label>Senha</label>
            <input type="password" id="input-password" required />

            <button type="submit">Criar conta</button>
            <a href="#" id="link-login">Já tenho uma conta</a>
        </form>
    </section>



    <!--Login-->
    <section class="content-login" id="content-login">
        <h2>Login</h2>
        <form id="form-login">
            <label>Email</label>
            <input type="email" id="login-input-email" required />
            <label>Senha</label>
            <input type="password" id="login-input-password" required />
            <button type="submit">Entrar</button>
            <a href="#" id="link-criar-conta">cria conta</a>
        </form>
    </section>


    <script src="script.js"></script>
</body>

</html>
